<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <title>לוח משפחתי</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .left, .right {
      width: 50%;
      padding: 10px;
      box-sizing: border-box;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      border-radius: 12px;
      background: #fff;
    }

    .toolbar {
      position: absolute;
      top: 10px;
      right: 10px;
      z-index: 10;
    }

    button {
      padding: 10px;
      margin-left: 5px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .weekly {
      display: none;
      height: 100%;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      height: 100%;
      gap: 5px;
    }

    .cell {
      background: #222;
      border-radius: 10px;
      padding: 5px;
      font-size: 14px;
    }

    .header {
      font-weight: bold;
      text-align: center;
      background: #333;
    }

  </style>
</head>
<body>

<div class="toolbar">
  <button onclick="showMonthly()">חודשי</button>
  <button onclick="showWeekly()">שבועי</button>
</div>

<div class="container" id="monthlyView">
  <div class="left">
    <iframe src="https://calendar.google.com/calendar/embed?mode=MONTH"></iframe>
  </div>
  <div class="right">
    <iframe src="https://tasks.google.com/embed/list/"></iframe>
  </div>
</div>

<div class="weekly" id="weeklyView">
  <div class="grid">
    <div class="cell header">יום</div>
    <div class="cell header">אבא</div>
    <div class="cell header">אמא</div>
    <div class="cell header">ילד 1</div>
    <div class="cell header">ילד 2</div>
    <div class="cell header">ילד 3</div>
    <div class="cell header">ילד 4</div>
    <div class="cell header">ילד 5</div>
    <div class="cell header">ילד 6</div>

    <script>
      const days = ['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
      for (let d = 0; d < 7; d++) {
        document.write(`<div class='cell header'>${days[d]}</div>`);
        for (let i = 0; i < 8; i++) {
          document.write("<div class='cell'></div>");
        }
      }
    </script>
  </div>
</div>

<script>
  function showWeekly() {
    document.getElementById('monthlyView').style.display = 'none';
    document.getElementById('weeklyView').style.display = 'block';
  }

  function showMonthly() {
    document.getElementById('monthlyView').style.display = 'flex';
    document.getElementById('weeklyView').style.display = 'none';
  }
</script>

</body>
</html>
